<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Рандомайзер цветов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <ul>
            <li> Рандомайзер цветов </li>
            <li> <img src="img/logo-meniu.png" width="20px"> </li>
        </ul>
    </nav>
    <div class="container">

        <h1 class="name"> Название цвета </h1>
        <div class="color-box"></div>
        
        <div class="color-codes">
            <div class="code-item">
                <span class="code-label">HEX:</span>
                <span class="hex-code">#000000</span>
            </div>
            <div class="code-item">
                <span class="code-label">RGB:</span>
                <span class="rgb-code">rgb(0, 0, 0)</span>
            </div>
            <div class="code-item">
                <span class="code-label">HSL:</span>
                <span class="hsl-code">hsl(0, 0%, 0%)</span>
            </div>
        </div>
        
        <button class="button">тыкни</button>
    </div>

    <script src="generator.js"></script>
</body>
</html>
